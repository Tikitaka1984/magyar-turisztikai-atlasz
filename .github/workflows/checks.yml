name: Magyar Turisztikai Atlasz checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: JavaScript syntax and data validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check adatok.js syntax
        run: node --check adatok.js

      - name: Check kviz.js syntax
        run: node --check kviz.js

      - name: Check alkalmazas.js syntax
        run: node --check alkalmazas.js

      - name: Validate project data
        run: node tools/validate-data.js
